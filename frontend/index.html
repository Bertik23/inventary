<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link data-trunk rel="copy-file" href="sw.js">
    <link data-trunk rel="copy-file" href="manifest.json">
    <link data-trunk rel="copy-file" href="icon-192.png">
    <link data-trunk rel="copy-file" href="icon-512.png">
    <meta name="theme-color" content="#4a90e2">
    <meta name="description" content="Simple inventory management system">
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Optional: ZXing library for browsers without BarcodeDetector API support -->
    <!-- Uncomment the line below if you want barcode scanning in Firefox/Safari -->
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="app"></div>
    <script type="module">
        import init from '/pkg/inventary_frontend.js';
        
        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
        
        init();
    </script>
</body>
</html>
